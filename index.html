<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#4f46e5" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
  <title>Minha Estante</title>
</head>
<body class="bg-light">
  <div class="container py-4">
    <header class="text-center mb-4">
      <h1 class="mb-2">Minha Estante</h1>
      <p class="text-muted">Organize seus livros e registre suas leituras</p>
    </header>

    <section class="card shadow-sm mb-4">
      <div class="card-body">
        <h2 class="h4 mb-3">Cadastro de Livros</h2>

        <form id="book-form">
          <input type="hidden" id="book-id" />

          <div class="mb-3">
            <label for="book-title" class="form-label">Título</label>
            <input type="text" id="book-title" class="form-control" placeholder="Digite o título do livro" required />
          </div>

          <div class="mb-3">
            <label for="book-author" class="form-label">Autor</label>
            <input type="text" id="book-author" class="form-control" placeholder="Digite o autor" required />
          </div>

          <div class="mb-3">
            <label for="book-genre" class="form-label">Gênero</label>
            <input type="text" id="book-genre" class="form-control" placeholder="Digite o gênero" required />
          </div>

          <div class="mb-3">
            <label for="book-status" class="form-label">Status de leitura</label>
            <select id="book-status" class="form-select" required>
              <option value="">Selecione</option>
              <option value="Quero ler">Quero ler</option>
              <option value="Lendo">Lendo</option>
              <option value="Lido">Lido</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="book-rating" class="form-label">Nota</label>
            <input type="number" id="book-rating" class="form-control" min="0" max="5" placeholder="Dê uma nota de 0 a 5" required />
          </div>

          <div class="d-flex gap-2 flex-wrap">
            <button type="submit" class="btn btn-primary">Salvar livro</button>
            <button type="button" id="cancel-book-edit" class="btn btn-secondary hidden">Cancelar edição</button>
          </div>
        </form>
      </div>
    </section>

    <section class="card shadow-sm mb-4">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
          <h2 class="h4 mb-0">Minha biblioteca</h2>
        </div>

        <div id="books-list"></div>
      </div>
    </section>

    <section class="card shadow-sm mb-4">
      <div class="card-body">
        <h2 id="form-title" class="h4 mb-3">Novo registro de leitura</h2>

        <form id="entry-form">
          <input type="hidden" id="entry-id" />

          <div class="mb-3">
            <label for="title" class="form-label">Título do registro</label>
            <input type="text" id="title" class="form-control" required />
          </div>

          <div class="mb-3">
            <label for="description" class="form-label">Descrição</label>
            <textarea id="description" rows="4" class="form-control" required></textarea>
          </div>

          <div class="mb-3">
            <label for="happenedAt" class="form-label">Data e hora</label>
            <input type="datetime-local" id="happenedAt" class="form-control" required />
          </div>

          <div class="d-flex gap-2 flex-wrap">
            <button type="submit" class="btn btn-primary">Salvar registro</button>
            <button type="button" id="cancel-edit" class="btn btn-secondary hidden">Cancelar edição</button>
          </div>
        </form>

        <p id="message" class="mt-3 mb-0"></p>
      </div>
    </section>

    <section class="card shadow-sm">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
          <h2 class="h4 mb-0">Registros de leitura</h2>
          <button id="reload-btn" class="btn btn-outline-secondary">Atualizar</button>
        </div>

        <div id="entries-list"></div>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
